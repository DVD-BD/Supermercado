<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<title>SuperMarket</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<header>

<h1>SuperMarket</h1>

<input type="text" id="buscador" placeholder="Buscar productos..." onkeyup="buscarProducto()">

<div class="cuenta">
👤 Cuenta
</div>

<div class="cuenta">

<span id="usuarioTexto">Invitado</span>

<button onclick="iniciarSesion()">Iniciar sesión</button>

<button onclick="cerrarSesion()">Cerrar sesión</button>

</div>

  
<div class="carritoIcono" onclick="abrirCarrito()">
🛒 <span id="contadorCarrito">0</span>
</div>

</header>

<!-- SLIDER -->

<div class="slider">

<img id="slideImg" src="https://source.unsplash.com/1200x400/?supermarket">

<button class="sliderBtn prev" onclick="prevSlide()">❮</button> <button class="sliderBtn next" onclick="nextSlide()">❯</button>

</div>

<!-- CATEGORIAS (AHORA ABAJO DEL SLIDER) -->

<div class="categorias">

<button onclick="filtrar('todos')">Todos</button> <button onclick="filtrar('comida')">Comida</button> <button onclick="filtrar('bebidas')">Bebidas</button> <button onclick="filtrar('snacks')">Snacks</button> <button onclick="filtrar('limpieza')">Limpieza</button> <button onclick="filtrar('hogar')">Hogar</button>

</div>

<!-- PRODUCTOS -->

<div id="productos" class="productos"></div>

<!-- PAGINA DE PRODUCTO -->

<div id="productoVista" class="productoVista">

<button class="cerrar" onclick="cerrarProducto()">X</button>

<img id="productoImg">

<h2 id="productoNombre"></h2>

<p id="productoDesc"></p>

<h3 id="productoPrecio"></h3>

<button onclick="agregarDesdeVista()">Agregar al carrito</button>

</div>

<!-- CARRITO -->

<div id="carrito" class="carrito">

<h2>Carrito</h2>

<div id="listaCarrito"></div>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="irCheckout()">Pagar</button>

<button onclick="cerrarCarrito()">Cerrar</button>

</div>

<!-- CHECKOUT -->

<div id="checkout" class="checkout">

<h2>Compra realizada</h2>

<p>Gracias por comprar</p>

<button onclick="finalizarCompra()">Volver</button>

</div>

<script src="script.js"></script>

</body>
</html>
