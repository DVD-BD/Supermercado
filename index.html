<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Supermercado</title>

<link rel="stylesheet" href="estilos.css">

</head>

<body>

<header>

<h1>Supermercado</h1>

<input 
type="text" 
id="buscador" 
placeholder="Buscar producto..."
onkeyup="buscarProducto()"
>

<button onclick="abrirCarrito()">
🛒 <span id="contadorCarrito">0</span>
</button>

</header>


<nav>

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('comida')">Comida</button>
<button onclick="filtrar('bebidas')">Bebidas</button>
<button onclick="filtrar('snacks')">Snacks</button>

</nav>


<section id="productos"></section>


<!-- CARRITO -->

<div id="carrito" class="carrito">

<h2>Carrito</h2>

<div id="listaCarrito"></div>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="pagar()">Pagar</button>

<button onclick="cerrarCarrito()">Cerrar</button>

</div>


<!-- LOGIN -->

<div id="login" class="login">

<h2>Cuenta</h2>

<input type="text" placeholder="Usuario">

<input type="password" placeholder="Contraseña">

<button>Ingresar</button>

</div>


<script src="script.js"></script>

</body>
</html>
