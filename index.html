<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<title>SuperMarket</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<header>

<h1>SuperMarket</h1>

<input type="text" id="buscador" placeholder="Buscar productos..." onkeyup="buscarProducto()">

<div class="categorias">

<button onclick="filtrar('todos')">Todos</button> <button onclick="filtrar('comida')">Comida</button> <button onclick="filtrar('bebidas')">Bebidas</button> <button onclick="filtrar('snacks')">Snacks</button> <button onclick="filtrar('limpieza')">Limpieza</button>

</div>

<div class="carritoIcono" onclick="abrirCarrito()">
🛒 <span id="contadorCarrito">0</span>
</div>

</header>

<div class="slider">

<img id="slideImg" src="https://source.unsplash.com/1200x300/?supermarket">

<button class="sliderBtn prev" onclick="prevSlide()">❮</button> <button class="sliderBtn next" onclick="nextSlide()">❯</button>

</div>

<div id="productos" class="productos"></div>

<div id="carrito" class="carrito">

<h2>Carrito</h2>

<div id="listaCarrito"></div>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="irCheckout()">Comprar</button> <button onclick="cerrarCarrito()">Cerrar</button>

</div>

<script src="script.js"></script>

</body>
</html>
