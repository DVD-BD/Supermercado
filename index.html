<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>SuperMarket</title>

<link rel="stylesheet" href="estilos.css">

</head>

<body>

<header>

<h1>SuperMarket</h1>

<input type="text" id="buscador" placeholder="Buscar producto..." onkeyup="buscarProducto()">

<button onclick="abrirCarrito()">🛒 <span id="contadorCarrito">0</span></button>

</header>


<nav>

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('comida')">Comida</button>
<button onclick="filtrar('bebidas')">Bebidas</button>
<button onclick="filtrar('snacks')">Snacks</button>

</nav>


<section class="slider">

<button onclick="prevSlide()">❮</button>

<img id="slideImg" src="https://source.unsplash.com/1200x400/?supermarket">

<button onclick="nextSlide()">❯</button>

</section>


<section id="productos"></section>


<div id="carrito">

<h2>Carrito</h2>

<div id="listaCarrito"></div>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="window.location.href='checkout.html'">Pagar</button>

<button onclick="cerrarCarrito()">Cerrar</button>

</div>


<script src="script.js"></script>

</body>
</html>
