<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SuperTienda</title>

<link rel="stylesheet" href="estilos.css">

</head>

<body>

<header class="topbar">

<div class="logo">SuperTienda</div>

<div class="search">
<input type="text" id="buscador" placeholder="Buscar productos...">
</div>

<div class="icons">
<span onclick="toggleCarrito()">🛒 Carrito (<span id="contador">0</span>)</span>
</div>

</header>

<nav class="menu">

<ul>

<li onclick="mostrarCategoria('todos')">Todos</li>

<li onclick="mostrarCategoria('comida')">Comida</li>

<li onclick="mostrarCategoria('bebidas')">Bebidas</li>

<li onclick="mostrarCategoria('limpieza')">Limpieza</li>

<li onclick="mostrarCategoria('hogar')">Hogar</li>

</ul>

</nav>

<section class="banner">

<img id="bannerImg" src="https://picsum.photos/1200/300?1">

</section>

<section id="productos" class="productos">

</section>

<div id="panelCarrito" class="panelCarrito">

<h2>Carrito</h2>

<div id="listaCarrito"></div>

<p>Total: $<span id="total">0</span></p>

<button onclick="cerrarCarrito()">Cerrar</button>

</div>

<footer>

<p>© 2026 SuperTienda</p>

</footer>

<script src="script.js"></script>

</body>

</html>
