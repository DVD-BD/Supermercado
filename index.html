<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Supermercado Online</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<header class="topbar">

<h1>Supermercado</h1>

<input type="text" id="buscador" placeholder="Buscar productos...">

<div class="carritoBtn" onclick="toggleCarrito()">
🛒 Carrito (<span id="contador">0</span>)
</div>

</header>


<nav class="menu">

<button onclick="mostrarCategoria('todos')">Todos</button>
<button onclick="mostrarCategoria('comida')">Comida</button>
<button onclick="mostrarCategoria('bebidas')">Bebidas</button>
<button onclick="mostrarCategoria('limpieza')">Limpieza</button>
<button onclick="mostrarCategoria('hogar')">Hogar</button>

</nav>


<main>

<div id="productos" class="productos"></div>

</main>



<div id="panelCarrito" class="panelCarrito">

<h2>Carrito</h2>

<div id="listaCarrito"></div>

<p>Total: $<span id="total">0</span></p>

<button onclick="comprar()">Finalizar compra</button>

</div>


<script src="script.js"></script>

</body>
</html>
