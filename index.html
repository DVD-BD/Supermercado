<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Supermercado</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<header>

<h1>Supermercado</h1>

<input type="text" id="buscador" placeholder="Buscar producto..." onkeyup="buscarProducto()">

<div class="menu">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('comida')">Comida</button>
<button onclick="filtrar('bebidas')">Bebidas</button>
<button onclick="filtrar('snacks')">Snacks</button>
<button onclick="filtrar('limpieza')">Limpieza</button>
<button onclick="filtrar('hogar')">Hogar</button>
</div>

<div class="carritoIcono" onclick="abrirCarrito()">
🛒 <span id="contadorCarrito">0</span>
</div>

</header>


<!-- SLIDER -->

<div class="slider">

<button class="sliderBtn prev" onclick="prevSlide()">❮</button>

<img id="slideImg" src="https://source.unsplash.com/1200x400/?supermarket">

<button class="sliderBtn next" onclick="nextSlide()">❯</button>

</div>


<!-- PRODUCTOS -->

<div id="productos" class="productos"></div>


<!-- CARRITO -->

<div id="carrito" class="carrito">

<button onclick="cerrarCarrito()">Cerrar</button>

<h2>Carrito</h2>

<div id="listaCarrito"></div>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="pagar()">Pagar</button>

</div>


<!-- VISTA PRODUCTO -->

<div id="productoVista" class="productoVista">

<button class="cerrar" onclick="cerrarVista()">X</button>

<img id="vistaImg">

<h2 id="vistaNombre"></h2>

<p id="vistaDesc"></p>

<h3>$<span id="vistaPrecio"></span></h3>

<button onclick="agregarDesdeVista()">Agregar al carrito</button>

</div>


<!-- CHECKOUT -->

<div id="checkout" class="checkout">

<h2>Compra realizada</h2>

<p>Gracias por tu compra</p>

<button onclick="cerrarCheckout()">Cerrar</button>

</div>


<script src="script.js"></script>

</body>
</html>
