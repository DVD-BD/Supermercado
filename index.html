<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>SuperMarket</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<header class="topbar">

<div class="logo">SuperMarket</div>

<input id="buscador" type="text" placeholder="Buscar productos...">

<div>

<button onclick="toggleCuenta()">👤</button>

<button onclick="toggleCarrito()">
🛒 <span id="contador">0</span>
</button>

</div>

</header>


<nav class="menu">

<button onclick="mostrarCategoria('todos')">Todos</button>
<button onclick="mostrarCategoria('comida')">Comida</button>
<button onclick="mostrarCategoria('bebidas')">Bebidas</button>
<button onclick="mostrarCategoria('limpieza')">Limpieza</button>
<button onclick="mostrarCategoria('hogar')">Hogar</button>

</nav>


<div id="productos" class="productos"></div>


<div id="panelCarrito" class="panelCarrito">

<div class="carritoHeader">
<h2>Carrito</h2>
<button onclick="toggleCarrito()">X</button>
</div>

<div id="listaCarrito"></div>

<p class="total">Total: $<span id="total">0</span></p>

<a href="checkout.html">
<button class="checkoutBtn">Ir a pagar</button>
</a>

</div>


<div id="panelCuenta" class="panelCuenta">

<h2>Cuenta</h2>

<input placeholder="Correo">
<input placeholder="Contraseña">

<button>Iniciar sesión</button>

<button onclick="toggleCuenta()">Cerrar</button>

</div>


<script src="script.js"></script>

</body>
</html>
